# HAProxy Configuration for File Transfer System Load Balancing

global
    # Process and security settings
    daemon
    user haproxy
    group haproxy
    chroot /var/lib/haproxy
    
    # Performance settings
    maxconn 4096
    nbthread 4
    
    # SSL settings
    ssl-default-bind-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    
    # Logging
    log stdout local0 info

defaults
    # Mode and timeouts
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    timeout http-request 10s
    timeout http-keep-alive 2s
    
    # HTTP options
    option httplog
    option dontlognull
    option http-server-close
    option redispatch
    
    # Retry settings
    retries 3
    
    # Load balancing algorithm
    balance roundrobin
    
    # Health check settings
    option httpchk GET /actuator/health HTTP/1.1\r\nHost:\ localhost

# Statistics interface
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats hide-version

# Main frontend for HTTP traffic
frontend file_transfer_frontend
    bind *:80
    mode http
    
    # Request processing
    option httplog
    option forwardfor
    
    # Rate limiting
    stick-table type ip size 100k expire 30s store http_req_rate(10s),http_err_rate(10s)
    http-request track-sc0 src
    http-request deny if { sc_http_req_rate(0) gt 20 }
    
    # Security headers
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # Routing rules
    
    # API endpoints
    acl is_api path_beg /api/
    use_backend file_transfer_api if is_api
    
    # Static content
    acl is_static path_beg /static/ /css/ /js/ /images/
    use_backend file_transfer_static if is_static
    
    # Admin interface
    acl is_admin path_beg /admin/
    use_backend file_transfer_admin if is_admin
    
    # Health checks
    acl is_health path_beg /actuator/health
    use_backend file_transfer_health if is_health
    
    # Default backend
    default_backend file_transfer_api

# Backend for API endpoints
backend file_transfer_api
    mode http
    balance roundrobin
    
    # Health check configuration
    option httpchk GET /actuator/health HTTP/1.1\r\nHost:\ localhost
    http-check expect status 200
    
    # Server configuration with health checks
    server app1 file-transfer-app-1:8080 check inter 10s fall 3 rise 2 weight 100 maxconn 100
    server app2 file-transfer-app-2:8080 check inter 10s fall 3 rise 2 weight 100 maxconn 100
    server app3 file-transfer-app-3:8080 check inter 10s fall 3 rise 2 weight 100 maxconn 100
    
    # Connection settings
    option httpclose
    option abortonclose
    
    # Request/response modifications
    http-request set-header X-Forwarded-Proto http
    http-request set-header X-Forwarded-For %[src]
    http-request add-header X-Load-Balancer HAProxy

# Backend for static content (with caching optimizations)
backend file_transfer_static
    mode http
    balance roundrobin
    
    # Static content servers (could be CDN or dedicated static servers)
    server static1 file-transfer-app-1:8080 check weight 50
    server static2 file-transfer-app-2:8080 check weight 50
    server static3 file-transfer-app-3:8080 check weight 50
    
    # Caching headers for static content
    http-response set-header Cache-Control "public, max-age=3600"
    http-response set-header Expires %[date(3600),http_date]

# Backend for admin interface (more restrictive)
backend file_transfer_admin
    mode http
    balance roundrobin
    
    # Admin servers with lower weight (admin traffic should be minimal)
    server admin1 file-transfer-app-1:8080 check weight 100 maxconn 50
    server admin2 file-transfer-app-2:8080 check weight 100 maxconn 50
    
    # Additional security for admin
    http-request deny if { src -f /etc/haproxy/admin_whitelist.txt }

# Backend for health checks (optimized for quick responses)
backend file_transfer_health
    mode http
    balance roundrobin
    
    # Health check endpoints
    server health1 file-transfer-app-1:8080 check inter 5s
    server health2 file-transfer-app-2:8080 check inter 5s
    server health3 file-transfer-app-3:8080 check inter 5s
    
    # Fast timeouts for health checks
    timeout server 2s

# Advanced configuration for file upload endpoints
backend file_transfer_upload
    mode http
    balance leastconn  # Use least connections for upload-heavy operations
    
    # Upload servers with higher timeouts
    server upload1 file-transfer-app-1:8080 check maxconn 20
    server upload2 file-transfer-app-2:8080 check maxconn 20
    server upload3 file-transfer-app-3:8080 check maxconn 20
    
    # Extended timeouts for file uploads
    timeout server 300s
    timeout client 300s

# SSL termination frontend (if using HTTPS)
frontend file_transfer_ssl
    bind *:443 ssl crt /etc/ssl/certs/file-transfer.pem
    mode http
    
    # Redirect HTTP to HTTPS
    redirect scheme https code 301 if !{ ssl_fc }
    
    # SSL security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    
    # Use the same backend routing as HTTP
    acl is_api path_beg /api/
    use_backend file_transfer_api if is_api
    
    default_backend file_transfer_api

# Error pages
errorfile 400 /etc/haproxy/errors/400.http
errorfile 403 /etc/haproxy/errors/403.http
errorfile 408 /etc/haproxy/errors/408.http
errorfile 500 /etc/haproxy/errors/500.http
errorfile 502 /etc/haproxy/errors/502.http
errorfile 503 /etc/haproxy/errors/503.http
errorfile 504 /etc/haproxy/errors/504.http

# Logging configuration
log-format "%ci:%cp [%t] %ft %b/%s %Tq/%Tw/%Tc/%Tr/%Ta %ST %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq %hr %hs %{+Q}r"