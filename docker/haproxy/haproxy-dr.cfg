# HAProxy Configuration for Disaster Recovery
# Provides automatic failover between primary and secondary regions

global
    log stdout local0
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # Intermediate configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option log-health-checks
    option forwardfor
    option http-server-close
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    timeout http-request 10s
    timeout http-keep-alive 2s
    timeout check 10s
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# Frontend for File Transfer Application
frontend file_transfer_frontend
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/haproxy.pem
    
    # Redirect HTTP to HTTPS
    redirect scheme https if !{ ssl_fc }
    
    # Security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options "DENY"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    
    # Health check endpoint
    acl is_health_check path_beg /health
    use_backend health_check if is_health_check
    
    # API endpoints
    acl is_api path_beg /api
    use_backend file_transfer_api if is_api
    
    # Static content
    acl is_static path_beg /static /assets /favicon.ico /robots.txt
    use_backend file_transfer_static if is_static
    
    # Default backend for web application
    default_backend file_transfer_web

# Backend for API (with disaster recovery)
backend file_transfer_api
    balance roundrobin
    option httpchk GET /actuator/health
    http-check expect status 200
    
    # Primary region servers
    server primary-api-1 file-transfer-app:8080 check inter 10s fall 3 rise 2 weight 100
    
    # Secondary region servers (backup)
    server secondary-api-1 file-transfer-app-secondary:8080 check inter 10s fall 3 rise 2 weight 50 backup
    
    # Custom health check for failover decision
    option log-health-checks
    
    # Enable session persistence for stateful operations
    cookie JSESSIONID prefix nocache

# Backend for Web Application
backend file_transfer_web
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    # Primary region servers
    server primary-web-1 file-transfer-app:8080 check inter 10s fall 3 rise 2 weight 100
    
    # Secondary region servers (backup)
    server secondary-web-1 file-transfer-app-secondary:8080 check inter 10s fall 3 rise 2 weight 50 backup
    
    # Failover configuration
    option allbackups  # Use backup servers when all primary servers are down

# Backend for Static Content (CDN-like behavior)
backend file_transfer_static
    balance roundrobin
    option httpchk GET /health
    
    # Cache static content
    http-response set-header Cache-Control "public, max-age=86400"
    
    # Primary region servers
    server primary-static-1 file-transfer-app:8080 check inter 30s fall 2 rise 1 weight 100
    
    # Secondary region servers (backup)
    server secondary-static-1 file-transfer-app-secondary:8080 check inter 30s fall 2 rise 1 weight 50 backup

# Health check backend
backend health_check
    mode http
    http-request return status 200 content-type "application/json" string "{\"status\":\"UP\",\"loadBalancer\":\"operational\"}"

# Statistics and monitoring
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    
    # Authentication for stats page
    stats auth admin:admin123
    
    # Show detailed server information
    stats show-legends
    stats show-node
    
    # Custom CSS for better appearance
    stats realm "HAProxy Statistics"
    
# Health monitoring for disaster recovery coordination
listen dr_monitor
    bind *:8405
    mode http
    
    # Disaster recovery status endpoint
    http-request return status 200 content-type "application/json" string "{\"primary\":\"${PRIMARY_STATUS:-up}\",\"secondary\":\"${SECONDARY_STATUS:-standby}\",\"failover\":\"${FAILOVER_STATUS:-ready}\"}"

# Additional frontend for batch processing
frontend batch_frontend
    bind *:8082
    
    # Route to batch backend
    default_backend file_transfer_batch

# Backend for Batch Processing
backend file_transfer_batch
    balance roundrobin
    option httpchk GET /actuator/health
    http-check expect status 200
    
    # Primary batch servers
    server primary-batch-1 file-transfer-batch-1:8082 check inter 15s fall 3 rise 2 weight 100
    server primary-batch-2 file-transfer-batch-2:8082 check inter 15s fall 3 rise 2 weight 100
    
    # Configure for long-running batch operations
    timeout server 300s
    timeout connect 10s

# Disaster Recovery Configuration
# This section defines the failover behavior and health monitoring

# Global health check script integration
# (These would be called by external monitoring systems)

# Primary region health check
listen primary_health
    bind *:8406
    mode http
    option httpchk GET /actuator/health
    server primary-check file-transfer-app:8080 check
    
    # Return 200 if primary is healthy, 503 if not
    http-request return status 200 if { srv_is_up(primary-check) }
    http-request return status 503

# Secondary region health check
listen secondary_health
    bind *:8407
    mode http
    option httpchk GET /actuator/health
    server secondary-check file-transfer-app-secondary:8080 check
    
    # Return 200 if secondary is healthy, 503 if not
    http-request return status 200 if { srv_is_up(secondary-check) }
    http-request return status 503

# Database failover configuration
listen postgres_failover
    bind *:5432
    mode tcp
    option tcplog
    option tcp-check
    
    # Primary database
    server postgres-primary postgres-primary:5432 check port 5432 inter 10s fall 3 rise 2 weight 100
    
    # Secondary database (read-only or standby)
    server postgres-secondary postgres-secondary:5432 check port 5432 inter 10s fall 3 rise 2 weight 50 backup

# Redis failover configuration
listen redis_failover
    bind *:6379
    mode tcp
    option tcplog
    option tcp-check
    
    # Primary Redis
    server redis-primary redis-primary:6379 check port 6379 inter 10s fall 3 rise 2 weight 100
    
    # Secondary Redis
    server redis-secondary redis-secondary:6379 check port 6379 inter 10s fall 3 rise 2 weight 50 backup

# Log configuration for disaster recovery events
# Custom log format for DR events
capture request header X-DR-Event len 64
capture request header X-Failover-Reason len 128

# ACLs for disaster recovery management
acl is_dr_command path_beg /dr/
acl is_failover_trigger path_beg /dr/failover
acl is_status_check path_beg /dr/status

# Security: Only allow DR commands from authorized sources
acl authorized_dr_source src 172.20.0.0/16 127.0.0.1

# Block unauthorized DR commands
http-request deny if is_dr_command !authorized_dr_source

# Custom error pages for disaster recovery scenarios
errorfile 503 /etc/haproxy/errors/503-dr.http

# Rate limiting for API endpoints during disaster recovery
stick-table type ip size 100k expire 30s store http_req_rate(10s)
http-request track-sc0 src if is_api
http-request deny if { sc_http_req_rate(0) gt 20 }

# Maintenance mode configuration
# This can be activated during planned maintenance or disaster recovery testing
acl maintenance_mode var(proc.maintenance_mode) -m bool
http-request return status 503 content-type "text/html" file /etc/haproxy/maintenance.html if maintenance_mode

# Dynamic configuration updates for disaster recovery
# Allow runtime configuration changes via stats socket
stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners