apiVersion: v1
kind: Namespace
metadata:
  name: file-transfer
  labels:
    name: file-transfer
    app.kubernetes.io/name: file-transfer
    app.kubernetes.io/component: namespace
    app.kubernetes.io/part-of: file-transfer-system
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: file-transfer-quota
  namespace: file-transfer
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "10"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: file-transfer-limits
  namespace: file-transfer
spec:
  limits:
  - default:
      cpu: "1000m"
      memory: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container