server:
  port: 8081
  servlet:
    context-path: /batch-api

spring:
  application:
    name: file-flow-batch-service
  
  profiles:
    active: local
  
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:fileflow};encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:Password123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.SQLServerDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  batch:
    job:
      enabled: false # We'll start jobs programmatically
    jdbc:
      initialize-schema: always
  
  security:
    basic:
      enabled: false

# File monitoring configuration
fileflow:
  monitoring:
    poll-interval: 5000 # milliseconds
    thread-pool-size: 10
    max-retry-attempts: 3
    retry-delay: 60000 # milliseconds
  
  storage:
    azure:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=https;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;}
      container-name: ${AZURE_STORAGE_CONTAINER:fileflow-staging}
  
  validation:
    schema-base-path: ${SCHEMA_BASE_PATH:/app/schemas}
    temp-directory: ${TEMP_DIRECTORY:/tmp/fileflow}

# Logging configuration
logging:
  level:
    com.enterprise.fileflow: DEBUG
    org.springframework.batch: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/batch-service.log

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,batch
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true