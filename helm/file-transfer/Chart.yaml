apiVersion: v2
name: file-transfer
description: A Helm chart for File Transfer Microservices System
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://github.com/your-org/file-transfer-system
maintainers:
  - name: File Transfer Team
    email: filetransfer@yourcompany.com
keywords:
  - file-transfer
  - microservices
  - azure
  - kubernetes
sources:
  - https://github.com/your-org/file-transfer-system
dependencies:
  - name: postgresql
    version: 12.1.6
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: rabbitmq
    version: 11.1.1
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
  - name: redis
    version: 17.4.3
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
annotations:
  category: Application
  licenses: MIT