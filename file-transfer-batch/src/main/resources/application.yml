spring:
  application:
    name: file-transfer-batch
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local,ack-nack,compression,hsm}
  
  # Azure SQL Managed Instance Configuration (Production)
  datasource:
    url: jdbc:sqlserver://${AZURE_SQL_MI_SERVER:localhost}:${AZURE_SQL_MI_PORT:1433};database=${AZURE_SQL_MI_DATABASE:filetransfer};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
    username: ${AZURE_SQL_MI_USERNAME:filetransfer}
    password: ${AZURE_SQL_MI_PASSWORD:Password123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
  batch:
    job:
      enabled: false # Disable auto-start of jobs
    jdbc:
      initialize-schema: always

file-transfer:
  enabled: true
  poll-interval-seconds: 30
  # Services are now loaded from database - no static configuration needed
  # Configuration is managed through the web application interface
  
  # ACK/NACK configuration
  ack-nack:
    enabled: ${ACK_NACK_ENABLED:true}
    base-path: ${ACK_NACK_BASE_PATH:/data/ack-nack}
    incoming-path: ${ACK_NACK_INCOMING_PATH:/data/incoming/ack-nack}
    auto-generate: ${ACK_NACK_AUTO_GENERATE:true}
    timeout-hours: ${ACK_NACK_TIMEOUT_HOURS:24}

logging:
  level:
    com.filetransfer: DEBUG
    org.springframework.batch: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/file-transfer-batch.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

server:
  port: 8081

---
# Local Development Profile
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:sqlserver://localhost:1433;database=filetransfer;encrypt=false;trustServerCertificate=true
    username: sa
    password: Password123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

logging:
  level:
    com.filetransfer: DEBUG
    org.hibernate.SQL: DEBUG

---
# Azure AKS Profile
spring:
  config:
    activate:
      on-profile: aks
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    com.filetransfer: INFO

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.filetransfer: WARN