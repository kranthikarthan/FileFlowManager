spring:
  application:
    name: file-transfer-batch
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  batch:
    job:
      enabled: false # Disable auto-start of jobs
    jdbc:
      initialize-schema: always

file-transfer:
  enabled: true
  poll-interval-seconds: 30
  services:
    service1:
      inbound-path: /app/data/inbound/service1
      outbound-path: /app/data/outbound/service1
      start-marker-prefix: SOT_
      end-marker-prefix: EOT_
      data-file-pattern: "*.dat"
      enabled: true
      max-retries: 3
    service2:
      inbound-path: /app/data/inbound/service2
      outbound-path: /app/data/outbound/service2
      start-marker-prefix: START_
      end-marker-prefix: END_
      data-file-pattern: "*.xml"
      enabled: true
      max-retries: 3

logging:
  level:
    com.filetransfer: DEBUG
    org.springframework.batch: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/file-transfer-batch.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

server:
  port: 8081