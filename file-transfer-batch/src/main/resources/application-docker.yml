spring:
  application:
    name: file-transfer-batch
  datasource:
    url: jdbc:sqlserver://${AZURE_SQL_MI_SERVER:localhost}:${AZURE_SQL_MI_PORT:1433};database=${AZURE_SQL_MI_DATABASE:filetransfer};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
    username: ${AZURE_SQL_MI_USERNAME:filetransfer}
    password: ${AZURE_SQL_MI_PASSWORD:Password123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.SQLServerDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

file-transfer:
  enabled: true
  poll-interval-seconds: 30
  services:
    service1:
      inbound-path: /app/data/inbound/service1
      outbound-path: /app/data/outbound/service1
      start-marker-prefix: SOT_
      end-marker-prefix: EOT_
      data-file-pattern: "*.dat"
      enabled: true
      max-retries: 3
    service2:
      inbound-path: /app/data/inbound/service2
      outbound-path: /app/data/outbound/service2
      start-marker-prefix: START_
      end-marker-prefix: END_
      data-file-pattern: "*.xml"
      enabled: true
      max-retries: 3

logging:
  level:
    com.filetransfer: INFO
    org.springframework.batch: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/file-transfer-batch.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

server:
  port: 8081