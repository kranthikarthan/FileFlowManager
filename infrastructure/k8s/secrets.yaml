apiVersion: v1
kind: Secret
metadata:
  name: fileflow-secrets
  namespace: fileflow
type: Opaque
stringData:
  # Database credentials (replace with actual values)
  DB_USERNAME: "fileflow_user"
  DB_PASSWORD: "your-secure-password-here"
  
  # Azure Storage connection string (replace with actual value)
  AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=your-storage-account;AccountKey=your-storage-key;EndpointSuffix=core.windows.net"
  
  # JWT configuration (replace with actual values)
  JWT_ISSUER_URI: "https://login.microsoftonline.com/your-tenant-id/v2.0"
  TENANT_ID: "your-azure-tenant-id"
  
---
# SQL MI connection secret
apiVersion: v1
kind: Secret
metadata:
  name: fileflow-sqlmi-secret
  namespace: fileflow
type: Opaque
stringData:
  connection-string: "Server=tcp:fileflow-sqlmi.database.windows.net,1433;Initial Catalog=fileflow;Persist Security Info=False;User ID=fileflow_user;Password=your-secure-password-here;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"