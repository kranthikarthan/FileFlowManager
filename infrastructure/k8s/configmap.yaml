apiVersion: v1
kind: ConfigMap
metadata:
  name: fileflow-config
  namespace: fileflow
data:
  # Database configuration
  DB_HOST: "fileflow-sqlmi.database.windows.net"
  DB_PORT: "1433"
  DB_NAME: "fileflow"
  
  # Azure Storage configuration
  AZURE_STORAGE_CONTAINER: "fileflow-staging"
  
  # JWT configuration
  JWT_AUDIENCE: "api://fileflow-api"
  
  # CORS configuration
  CORS_ALLOWED_ORIGINS: "https://fileflow.yourdomain.com"
  
  # Schema and temp directories
  SCHEMA_BASE_PATH: "/app/schemas"
  TEMP_DIRECTORY: "/tmp/fileflow"
  
  # Monitoring configuration
  MONITORING_POLL_INTERVAL: "5000"
  MONITORING_THREAD_POOL_SIZE: "10"
  MONITORING_MAX_RETRY_ATTEMPTS: "3"
  MONITORING_RETRY_DELAY: "60000"